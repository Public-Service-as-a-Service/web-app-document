services:
  backend:
    build:
      context: ./backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      API_BASE_URL: ${API_BASE_URL:-}
      CLIENT_KEY: ${CLIENT_KEY:-}
      CLIENT_SECRET: ${CLIENT_SECRET:-}
      BASE_URL_PREFIX: ${BASE_URL_PREFIX:-/api}
      LOG_FORMAT: ${LOG_FORMAT:-combined}
      LOG_DIR: /app/data/logs
      ORIGIN: ${ORIGIN:-}
      REDIRECT_URL: ${REDIRECT_URL:-}
      MUNICIPALITY_ID: ${MUNICIPALITY_ID:-2281}
      AUTH_TYPE: ${AUTH_TYPE:-saml}
      AUTH_MODE: ${AUTH_MODE:-oauth2}
      ACCESS_TOKEN: ${ACCESS_TOKEN:-}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      SESSION_MEMORY: ${SESSION_MEMORY:-false}
      CREDENTIALS: ${CREDENTIALS:-true}
      SAML_CALLBACK_URL: ${SAML_CALLBACK_URL:-}
      SAML_LOGOUT_CALLBACK_URL: ${SAML_LOGOUT_CALLBACK_URL:-}
      SAML_FAILURE_REDIRECT: ${SAML_FAILURE_REDIRECT:-}
      SAML_ENTRY_SSO: ${SAML_ENTRY_SSO:-}
      SAML_ISSUER: ${SAML_ISSUER:-web-app-document}
      SAML_IDP_PUBLIC_CERT: ${SAML_IDP_PUBLIC_CERT:-}
      SAML_PRIVATE_KEY: ${SAML_PRIVATE_KEY:-}
      SAML_PUBLIC_KEY: ${SAML_PUBLIC_KEY:-}
      AUTHORIZED_GROUPS: ${AUTHORIZED_GROUPS:-}
      ADMIN_GROUP: ${ADMIN_GROUP:-}
      USER_GROUP: ${USER_GROUP:-}
    restart: unless-stopped
    volumes:
      - data:/app/data
    networks:
      - dokploy-network
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_USE_MOCK_DATA: ${NEXT_PUBLIC_USE_MOCK_DATA:-false}
        NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-}
        NEXT_PUBLIC_AUTH_TYPE: ${NEXT_PUBLIC_AUTH_TYPE:-saml}
    environment:
      BACKEND_URL: http://backend:3000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - dokploy-network
volumes:
  data:
networks:
  dokploy-network:
    external: true
